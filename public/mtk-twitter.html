<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Melify — People Helping People</title>
  <meta name="description" content="Post in your language. Read in yours. Melify breaks language barriers worldwide." />

  <!-- Material Icons Round -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />

  <!-- Google Fonts: DM Sans + Source Serif 4 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Source+Serif+4:wght@300;400;600&display=swap" />

  <link rel="stylesheet" href="mtk-twitter.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #080c12;
      overscroll-behavior-y: contain;
    }
    /* Ensure mtk-twitter fills viewport from top with no gap */
    mtk-twitter.mtk-twitter {
      display: block;
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>

  <mtk-twitter
    class="mtk-twitter"
    role="application"
    aria-label="Melify Social Feed"
  >
    <!-- MTKTwitter renders its own DOM tree here -->
  </mtk-twitter>

  <!-- 1. Config (must load before the class) -->
  <script src="mtk-twitter.config.js"></script>

  <!-- 2. Component class (auto-initializes itself) -->
  <script src="mtk-twitter.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof MTK_TWITTER_CONFIG === 'undefined') return;
      const { events } = MTK_TWITTER_CONFIG;

      wc.subscribe(events.USER_REGISTERED, payload => {
        console.log('[Host] Registered:', payload.data.user.username);
      });
      wc.subscribe(events.USER_LOGGED_IN, payload => {
        console.log('[Host] Login:', payload.data.user.display_name);
      });
      wc.subscribe(events.USER_LOGGED_OUT, () => {
        console.log('[Host] Logout');
      });
      wc.subscribe(events.TWEET_POSTED, payload => {
        console.log('[Host] Posted:', payload.data.tweet.text?.substring(0, 40));
      });
      wc.subscribe(events.TWEET_TRANSLATED, payload => {
        console.log('[Host] Translated:', payload.data.from, '→', payload.data.to);
      });
      wc.subscribe(events.LANGUAGE_CHANGED, payload => {
        console.log('[Host] Language:', payload.data.label);
      });
      wc.subscribe(events.AUTH_ERROR, payload => {
        console.warn('[Host] Auth error:', payload.data.error);
      });
    });
  </script>

</body>
</html>
